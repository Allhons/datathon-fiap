version: "3.9"

services:

  # ─── API de predição ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passos-magicos-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models          # Monta modelos treinados
      - ./logs:/app/logs              # Persiste logs de predições
      - ./data:/app/data              # Acesso aos dados processados
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ─── Dashboard de monitoramento ─────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passos-magicos-dashboard
    command: ["streamlit", "run", "src/monitoring/dashboard.py",
              "--server.port=8501", "--server.address=0.0.0.0",
              "--server.headless=true"]
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
